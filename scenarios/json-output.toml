name = "JSON output flag writes a run summary"

[setup.files."inner.toml"]
file = "json-output-inner.toml"

[[steps]]
run = "tact --output result.json inner.toml"

[steps.expected]
exit-code = 0

[[steps]]
run = "jq '{summary,scenarios:[.scenarios[]|{name,path,status,checks}]}' result.json > normalized.json"

[steps.expected]
exit-code = 0

[steps.expected.files."normalized.json"]
content = """
{
  "summary": {
    "pass": 1,
    "fail": 0,
    "error": 0,
    "skip": 0
  },
  "scenarios": [
    {
      "name": "Simple inner scenario",
      "path": "inner.toml",
      "status": "pass",
      "checks": []
    }
  ]
}
"""
